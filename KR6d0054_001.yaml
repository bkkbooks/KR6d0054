body:
  text: 卷第一義疏名義古師并今家分文古師二家今師四種科爾時語四悉釋釋無盡意菩薩名體空通後三教付其不同圓教三諦無盡義華嚴十無盡法門中道無盡義菩薩名義即從座起備二儀即從座起觀釋約三諦偏袒右肩外國禮儀此方以袒為慢或須賈肉袒謝張儀不一向慢偏袒右肩觀心釋合掌事釋觀解合掌表開權顯實合掌表權實五陰不二向佛二解問答具二莊嚴問有多種今問赴機問以何因緣約境智機應釋釋百千萬億衆生釋受諸苦惱聞菩薩名付善惡合為機圓聞思修一心稱名有事理二種三教應不一時圓應一時皆得解脫皆字顯機遍應遍令無量機一時得脫義稱名纍年不蒙寸益散心唱故三業機次第口機脫三種苦拔苦中少分有與樂與樂中無拔苦但與樂果不與樂因所以古師解七難并生起有師足風為八難或人難之今家三業次第義聖應無謀實無次第今解七難次第但舉七難有所表七難約所表通亘三業空識二種成難所以釋諸難例為三意一貼文二舉事證三觀行解釋持有二六為誦持心為秉持秉持亦口業攝若有設有復有皆不定挑脫辭持名遭難前後慈童女緣付記慈童女是男子晉謝敷作應驗傳齊陸果續之四人稱名免火難火難觀心釋有三障火三觀所對有果報火所以分段方便實報各有三道果報火從地獄至初禪并得脫業火相付嗔火欲火并得脫煩惱火相并得脫菩薩能救慈悲不出別圓兩觀漸觀本誓有三慈悲救三障火白骨流光付八色八勝處十一切處三觀救三障火別教亦一時遍應華嚴火法門付記是別教道圓觀慈悲脫火難相救三障火對二十五三昧他解義狹失二十四三昧廣大用第二水難之下説大水所漂所以免水難現證水難觀解有三障水愛見羅剎乞浮囊四流煩惱付記今無明約別惑異常途能觀兼別觀有二意漸觀頓應華嚴水法門海雲比丘説普眼經頓觀頓應救三障水對二十五三昧卷第二第三羅剎難之下釋人數明入海風是難由非正難七寶是正寶珠是為寶黑風他解今解一人稱名餘者悉脫此中結觀音名所以免羅剎難現證觀解有三障風付記今約風設觀釋所以僧護經因緣漸頓二觀風字門名義救三障風對二十五三昧第四刀杖難之下刀杖段段壞免刀杖難現證觀解有三障刀杖龍王降雨六天等感見不同煩惱譬刀杖漸頓二觀能應刀杖屬地字門華嚴地字門攝一切救三障刀杖對二十五三昧第五鬼難之下三千大千滿中是假設之辭水火不云滿中所以觀解有三障鬼淫鬼瞋鬼入人心三毒當體是鬼煩惱業不同并動業不動業見心為男鬼愛心為女鬼漸頓二觀能應華嚴鬼法門救三障鬼對二十五三昧第六枷鎖難之下有罪無罪并杻械枷鎖撿繫免枷鎖難現證觀釋有三障枷鎖妻子錢財等亦報亦業初三果有罪羅漢無罪大品指學無學為大龍摩訶那伽漸頓二觀能應空及識成三障付空識法門淨名四大空種識種皆空觀心近要多推心識或人根不等有觀外第七怨賊難之下怨本奪命賊本求財商主商人重寶險路安慰勸稱名歎德所以南無巍巍觀解有三障怨賊商主商人重寶怨賊約戒聽法修觀正助各釋師弟説聽兩人喜雜魔理教俱失第二明意業三毒機下三毒名義付記貪嗔恚單淫欲瞋恚愚癡復欲恚愚自淫瞋癡他破他云三毒少者念觀音毒多少各有機無機女人淫欲深相付記周褒似緣多欲男女有欲蟲又欲鬼嬈其心多欲少欲嗔恚障道事重百法明門付應如百法論例淫恚嗔亦有鬼愚癡過患并有鬼離三毒付他解但約伏今解經文通伏斷常念體達之相偏圓念智相對六句付今念即智離念説慧之過常念修觀之相付忘照各論四句常念約漸頓有諸四句三觀各有忘照離三四句觀解付界外三毒淨名天華著二乘身結習未盡界外菩薩三毒斥二乘譬大樹折枝離界外三毒有兩種菩薩逆説三毒觀付凡小毒少圓人毒多大品五不受無明力大佛智能斷菩薩無明尚有三毒為三法門一取門貪二捨門嗔三不取不捨癡大慈大悲與四無量中慈悲體異四攝十力四無所畏三般若并如大火炎四邊不可取無行經文殊云我是貪欲尸利等并記名外道名邪見人三法赴緣有順逆二説婆須密多女貪欲逆順滿足王瞋恚逆順欲是樂法故作實事恚害是苦故以幻事漸頓兩觀能應慈悲卷第三明身業為機下經説女人求男所以他解今解婦人七失付無子最苦便生福德智慧之男端正有相之女并衆人愛敬宿植德本付破他謬解先世不植善令於中有修福禮拜身業機亦免水火等難引求願滿事證地獄乃至欲天皆有無子之苦付記阿鼻無求子心觀解求男女法門無明為父貪憂為母六根男六塵女外書天陽地陰為男女約出世法門明父母生子慈悲為女善心為男定為女觀為男大經見佛性為丈夫相以能表男女難所表法門男女四悉因緣説有無并定慧不二而二定具慧慧具定付今經文亦爾經文以定慧互具顯體一以五戒對定女慧男以八定支林對男女四禪四無色四無量委對男女聲聞約五停心并緣諦理明男女三乘譬麞鹿象三獸意支佛約慈慧出入明男女約三藏菩薩明男女約通教菩薩明男女約別教菩薩明男女大慈大悲諸佛祖母名大女約圓菩薩明男女等約方便實報土明男女等人天藏通為邪見唯圓真正男女大經之前悉名邪見勸持菩薩名下三多四多為格量本經舉六十二億恆沙約現住菩薩舉四少格量四多四多四少功德正等舊五解并破今解約理一解正等事一多相理融即體法華論釋正等義觀解正等付引乞人等難勝如來一華散空功德至佛不盡第二番問答明普門義下問觀音三業利益三業三不護三無失三輪義示意業義付記有二義一隨自隨他二有緣無緣佛答三業問義二解三十三身十九説法束為十界身文闕菩薩界他四解并今解文闕地獄界他三解并今解有地獄身説法付記婆藪緣通約十身四句料簡一身度一界十身度十界一身度十界十身度一界方便實報華嚴圓機一身度一界華嚴八部別圓見一佛一界度多界多界度一界多界度多界四句歷五味人法相對多少四句因果相對多少四句破他偏局舊三十三身合為三類今家為八番觀音所現佛身經文約應付應化二身今文約應身所以付文殊不知妙音等覺所見亦是勝應實報土應相方便土應相付有界外土義變易土語別名方便土三種意生身并五種七種勝應劣應方便實報勝應同異方便土勝劣兩應與合身佛之異付通教合身之義生方便土利鈍二機付記方便土三重無明第十信破之淨穢同居土得名同居有淨穢二土論土淨穢有橫竪淨穢二土各有利鈍成四句修福生輕土付記三種福乘戒緩急四句現世有大小二機所以大小兩應同異時料簡華嚴頓機所感相華嚴三照涅槃五味卷第四小機所感相華嚴小機如聾如啞付記約初分義三漸成熟之相法華三乘皆成佛初後悉入醍醐佛慧涅槃悟入付法華後説般若涅槃三種三修示種種身説圓漸法四句并淨土亦然別圓本觀慈悲經諸國土兼方便實報又於娑婆見二土方便實報同名法性而有空中之異菩薩身之下頓部根利漸部根鈍委漸頓各有利鈍支佛下付文殊二萬億劫作支佛聲聞下付四枯四榮六人及如來莊嚴雙樹度佛界者約分證所度之佛必作因身本下迹高初地度等覺是加被梵王身下白色三昧不取不捨并方便實報土梵王帝釋身自在天并大自在付諸經論指色究竟天大將軍異説小王身多種付此亦有四句長者身付記長者十德居士宰官婆羅門比丘等四衆婦女身付不明小王婦所以童男童女身明八部下龍有四種付人間屋上作龍像天龍夜叉乾闥婆阿修羅迦樓羅付金翅與龍約諾并四生食異緊那羅付人非人義摩睺羅付八部皆變本形聽法執金剛神下界身化上界如王聞蟻鬪釋總答下付應遍三十一華嚴文廣義略今文文略義廣付破地人二番問答各有總別勸持三段破有人以總答為歎德前後問答奉旨有無兩解冥顯機應各具冥顯勸供養下觀音名施無畏者衆寶瓔珞文有異本價直百千兩金事解觀解舊云重法施今解約如法施財即法施義不肯受之事觀二解愍我等三解分作二分奉二佛表示重頌譯者并遵式師科節具足妙相等十字為偈二義汝聽觀音行等聞名及見身等三業冥顯義念彼觀音彼二義雖通諸機正用圓解所以還著於本人一切難所表不出地水等六種感應利益大旨無量苦逼身等長行偈頌總別前後互顯重頌別示三業九界望佛悉名惡趣真觀等五觀付觀字去聲慈悲名觀二解疏明本觀慈悲此解符佛意智光遍照能伏災風火付三災譬三土悲體戒雷震慈意妙大雲澍甘露法雨諍訟經官處等付此文見大師契聖旨妙音等五音配三觀念念勿生疑等具一切功德等歎聞品功德下持地菩薩自在之業付記三種業無等等四悉檀解四悉釋配圓位發心有三種今正真發名字即不名發并今文觀行名名字義
